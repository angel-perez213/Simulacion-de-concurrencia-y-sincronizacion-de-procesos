<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Concurrencia y Sincronización - Nave Espacial</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #fff;
        overflow: hidden;
    }

    .app {
        position: relative;
        width: 100%;
        min-height: 100vh;
    }

    .canvas-container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #000;
    }

    #ui {
        position: absolute;
        top: 8px;
        left: 8px;
        right: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 10;
        pointer-events: none;
    }

    .panel {
        background: rgba(20, 40, 80, 0.8);
        border: 2px solid #00FFFF;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
        pointer-events: auto;
    }

    #message {
        background: rgba(40, 30, 20, 0.9);
        border: 2px solid #FFFF00;
        text-align: center;
    }

    #status {
        background: rgba(20, 50, 30, 0.9);
        border: 2px solid #00FF00;
        text-align: center;
    }

    .control-panel {
        background: rgba(255, 255, 255, 0.93);
        border: 2px solid #6495ED;
        border-radius: 10px;
        padding: 8px;
        position: absolute;
        bottom: 8px;
        left: 8px;
        right: 8px;
        color: black;
        z-index: 10;
        font-size: 13px;
    }

    .button-group {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        margin-top: 8px;
    }

    button {
        background: #333;
        color: #fff;
        border: 1px solid #666;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 6px;
        font-size: 13px;
    }

    button:hover {
        background: #555;
    }

    #counters {
        background: rgba(25, 35, 60, 0.9);
        border: 2px solid #00FFFF;
        border-radius: 10px;
        padding: 8px;
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 90px;
        z-index: 10;
        font-size: 13px;
    }

    #progress-bar {
        width: 100%;
        height: 14px;
        background: #1e1e2e;
        border: 1px solid #fff;
        border-radius: 7px;
        position: relative;
        margin-top: 6px;
    }

    #progress-fill {
        height: 100%;
        background: linear-gradient(to right, #ff0000, #ffff00);
        border-radius: 7px;
        width: 0%;
    }

    #percentage {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: #ffff00;
        line-height: 14px;
    }

    @media (min-width: 768px) {
        #ui {
            top: 10px;
            left: 10px;
            right: 10px;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .panel {
            padding: 10px;
            font-size: 16px;
        }

        #mode-panel,
        #status {
            flex: 1 1 220px;
            max-width: 260px;
        }

        #message {
            flex: 2 1 380px;
            max-width: 450px;
        }

        .control-panel {
            left: 10px;
            right: auto;
            bottom: 10px;
            width: auto;
            max-width: 420px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        #counters {
            left: auto;
            right: 10px;
            bottom: 10px;
            width: 220px;
            font-size: 14px;
        }

        #progress-bar {
            height: 15px;
        }

        #percentage {
            font-size: 12px;
            line-height: 15px;
        }
    }
</style>
</head>
<body>
    <div class="app">
        <div class="canvas-container">
            <canvas id="canvas" width="1280" height="760"></canvas>
        </div>

        <div id="ui">
            <div class="panel" id="mode-panel">
                <div>Modo actual: <span id="current-mode">CONCURRENCIA</span></div>
            </div>

            <div class="panel" id="message">
                <div id="global-message">Presiona 1-8 para cambiar el modo</div>
            </div>

            <div class="panel" id="status">
                <div>SISTEMA ACTIVO</div>
            </div>
        </div>

        <div class="control-panel">
    <div>1-8: Modos | R: Reiniciar</div>
    <div class="button-group">
        <button onclick="changeMode(1)">1</button>
        <button onclick="changeMode(2)">2</button>
        <button onclick="changeMode(3)">3</button>
        <button onclick="changeMode(4)">4</button>
        <button onclick="changeMode(5)">5</button>
        <button onclick="changeMode(6)">6</button>
        <button onclick="changeMode(7)">7</button>
        <button onclick="changeMode(8)">8</button>
        <button onclick="resetAll()">R</button>
    </div>
</div>

        <div id="counters">
            <div>CONTADORES</div>
            <div id="race-counter">Race: 0</div>
            <div id="safe-counter">Safe: 0</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
                <div id="percentage">0%</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
